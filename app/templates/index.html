<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Prediction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffffdd;
            padding: 40px 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 26px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: #4facfe;
            background-image: linear-gradient(315deg, #4facfe 0%, #00f2fe 74%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
        .result {
            margin-top: 25px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #ff6b6b;
        }
        @media(max-width: 500px){
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Car Price Prediction</h2>
        <form method="POST" action="/predict">
            <label for="Levy">Levy</label>
            <input type="number" step="0.01" name="Levy" required>

            <label for="Manufacturer">Manufacturer</label>
            <input type="text" name="Manufacturer" required>

            <label for="Prod_year">Production Year</label>
            <input type="number" name="Prod. year" required>

            <label for="Category">Category</label>
            <input type="text" name="Category" required>

            <label for="Leather_interior">Leather Interior</label>
            <select name="Leather interior" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label for="Fuel_type">Fuel Type</label>
            <input type="text" name="Fuel type" required>

            <label for="Engine_volume">Engine Volume</label>
            <input type="number" step="0.1" name="Engine volume" required>

            <label for="Mileage">Mileage</label>
            <input type="number" name="Mileage" required>

            <label for="Gear_box_type">Gear Box Type</label>
            <input type="text" name="Gear box type" required>

            <label for="Drive_wheels">Drive Wheels</label>
            <input type="text" name="Drive wheels" required>

            <button type="submit">Predict Price</button>
        </form>

        {% if prediction %}
        <div class="result">
            Predicted Price: ${{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
