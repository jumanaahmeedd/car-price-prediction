<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveValue Predictor</title>
    <style>
        /* Your original CSS here (no changes needed) */
    </style>
</head>
<body>
<main class="shell">
    <div class="top-strip"></div>

    <header class="header">
        <div>
            <h1>DriveValue Car Price Predictor</h1>
            <p>Automotive-themed estimator with your existing Flask pipeline.</p>
        </div>
        <div class="signature">Jumana Ahmed</div>
    </header>

    <section class="content">
        {% if prediction_text %}
        <div class="prediction" aria-live="polite">
            <small>Predicted Price</small>
            <strong>{{ prediction_text }}</strong>
        </div>
        {% endif %}

        <form action="/predict" method="POST">
            <div class="section">
                <h2>Vehicle Profile</h2>
                <div class="grid">
                    <div class="field">
                        <label for="levy">Levy</label>
                        <input id="levy" type="number" step="any" min="0" name="Levy" placeholder="e.g. 1320" required>
                    </div>
                    <div class="field">
                        <label for="manufacturer">Manufacturer</label>
                        <input id="manufacturer" type="text" name="Manufacturer" placeholder="e.g. Toyota" required>
                    </div>
                    <div class="field">
                        <label for="prod-year">Prod. year</label>
                        <input id="prod-year" type="number" step="1" min="1950" max="2035" name="Prod. year" placeholder="e.g. 2018" required>
                    </div>
                    <div class="field">
                        <label for="category">Category</label>
                        <input id="category" type="text" name="Category" placeholder="e.g. Sedan" required>
                    </div>
                    <div class="field">
                        <label for="leather">Leather interior</label>
                        <select id="leather" name="Leather interior" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="fuel-type">Fuel type</label>
                        <select id="fuel-type" name="Fuel type" required>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="engine-volume">Engine volume</label>
                        <input id="engine-volume" type="number" step="any" min="0" name="Engine volume" placeholder="e.g. 2.0" required>
                    </div>
                    <div class="field">
                        <label for="mileage">Mileage</label>
                        <input id="mileage" type="number" step="1" min="0" name="Mileage" placeholder="e.g. 85000" required>
                    </div>
                    <div class="field">
                        <label for="cylinders">Cylinders</label>
                        <input id="cylinders" type="number" step="1" min="0" name="Cylinders" placeholder="e.g. 4" required>
                    </div>
                    <div class="field">
                        <label for="airbags">Airbags</label>
                        <input id="airbags" type="number" step="1" min="0" name="Airbags" placeholder="e.g. 6" required>
                    </div>
                    <div class="field">
                        <label for="gear-box">Gear box type</label>
                        <select id="gear-box" name="Gear box type" required>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="drive-wheels">Drive wheels</label>
                        <select id="drive-wheels" name="Drive wheels" required>
                            <option value="Front">Front</option>
                            <option value="Rear">Rear</option>
                            <option value="AWD">AWD</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="submit" type="submit">Predict Price</button>
                <div class="note">Compatible with your Flask endpoint and model input schema.</div>
            </div>
        </form>
    </section>
</main>
</body>
</html>
